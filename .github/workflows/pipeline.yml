name: ML CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 – validate
#   • dvc pull  →  restores bank.csv from DagsHub
#   • python train.py  →  trains RandomForest, logs to MLflow
#   • Uploads model_info.txt + mlruns/ as workflow artifacts
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  validate:
    name: "Validate – Train & Log to MLflow"
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc dvc-http

      # Configure DVC remote credentials via DagsHub token secret
      - name: Configure DVC remote credentials
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote modify dagshub --local auth basic
          dvc remote modify dagshub --local user 202202070
          dvc remote modify dagshub --local password "$DAGSHUB_TOKEN"

      # Pull bank.csv from DagsHub DVC remote
      - name: Pull data with DVC
        run: dvc pull

      - name: Verify dataset
        run: |
          echo "bank.csv is ready:"
          ls -lh bank.csv
          python -c "import pandas as pd; df=pd.read_csv('bank.csv'); print(f'Rows: {len(df)}, Cols: {len(df.columns)}')"

      - name: Train model
        run: python train.py

      - name: Verify model_info.txt
        run: |
          test -f model_info.txt || { echo "ERROR: model_info.txt missing"; exit 1; }
          echo "Run ID: $(cat model_info.txt)"

      # Upload run ID so deploy job can verify it
      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          retention-days: 7

      # Upload local MLflow tracking so deploy job can query without a server
      - name: Upload MLflow tracking data
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-tracking
          path: |
            mlruns/
            mlflow_uri.txt
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 – deploy
#   • Downloads model_info.txt + mlruns/
#   • check_threshold.py  →  fails if accuracy < 0.85
#   • Mock Docker build using the Run ID
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy – Threshold Check & Mock Docker Build"
    runs-on: ubuntu-latest
    needs: validate

    env:
      MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      ACCURACY_THRESHOLD: "0.85"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download MLflow tracking artifact
        uses: actions/download-artifact@v4
        with:
          name: mlflow-tracking

      - name: Show Run ID
        run: |
          echo "Run ID  : $(cat model_info.txt)"
          echo "MLflow  : $(cat mlflow_uri.txt 2>/dev/null || echo 'local')"

      # ── Pipeline Gate: fail here if accuracy < 0.85 ──────────────────────
      - name: Check accuracy threshold
        run: python check_threshold.py

      # ── Only reached when accuracy ≥ 0.85 ────────────────────────────────
      - name: Mock Docker Build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: ${RUN_ID}"
          docker build \
            --build-arg RUN_ID="${RUN_ID}" \
            --tag  "bank-deposit-classifier:${RUN_ID:0:8}" \
            --file Dockerfile \
            . && echo "✅ Docker build SUCCESS" || echo "⚠️  Docker daemon unavailable – mock build logged"
