name: ML CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:          # allows manual trigger from GitHub UI

# ──────────────────────────────────────────────────────────────────────────────
# JOB 1 – validate
#   • Pull data with DVC  (gracefully skips if no remote)
#   • Train the model
#   • Log the run to MLflow  (uses remote server if secret is set,
#     otherwise falls back to local ./mlruns)
#   • Export the Run ID to model_info.txt
#   • Upload model_info.txt + mlruns/ as workflow artefacts
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  validate:
    name: "Validate – Train & Log to MLflow"
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      SAMPLE_SIZE: "8000"

    steps:
      # 1. Check out source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # 3. Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc

      # 4. Pull data with DVC (skip gracefully if no remote is configured)
      - name: Pull data with DVC
        run: |
          if dvc remote list 2>/dev/null | grep -q .; then
            dvc pull --run-cache || echo "DVC pull failed – using local data"
          else
            echo "No DVC remote configured – using data already in workspace"
          fi

      # 5. Verify training data exists
      - name: Verify training data
        run: |
          ls -lh fashion-mnist_train.csv || { echo "ERROR: training CSV not found"; exit 1; }

      # 6. Train the model and log to MLflow
      - name: Train model
        run: python train.py

      # 7. Verify model_info.txt was created
      - name: Verify model_info.txt
        run: |
          if [ ! -f model_info.txt ]; then
            echo "ERROR: model_info.txt was not created by train.py"
            exit 1
          fi
          echo "Run ID: $(cat model_info.txt)"

      # 8. Upload model_info.txt so the deploy job can read it
      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          retention-days: 7

      # 9. Upload mlruns/ (local tracking) + mlflow_uri.txt so deploy job
      #    can query MLflow even without a remote server
      - name: Upload MLflow tracking data
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-tracking
          path: |
            mlruns/
            mlflow_uri.txt
          retention-days: 7

# ──────────────────────────────────────────────────────────────────────────────
# JOB 2 – deploy
#   • Download model_info.txt + mlruns/
#   • Run check_threshold.py (fails if accuracy < 0.85)
#   • Mock Docker build (prints Run ID)
# ──────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy – Threshold Check & Mock Docker Build"
    runs-on: ubuntu-latest
    needs: validate          # only run after validate succeeds

    env:
      MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      ACCURACY_THRESHOLD: "0.85"

    steps:
      # 1. Check out source code (needed for check_threshold.py)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # 3. Install mlflow so check_threshold.py can query the server
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn

      # 4. Download the Run ID artefact produced by the validate job
      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      # 5. Download MLflow tracking data (local mlruns if no remote server)
      - name: Download MLflow tracking artifact
        uses: actions/download-artifact@v4
        with:
          name: mlflow-tracking

      # 6. Display the Run ID we are going to evaluate
      - name: Show Run ID
        run: |
          echo "Evaluating Run ID: $(cat model_info.txt)"
          if [ -f mlflow_uri.txt ]; then
            echo "MLflow URI: $(cat mlflow_uri.txt)"
          fi

      # 7. Check accuracy threshold – exits 1 if below 0.85 ← pipeline gate
      - name: Check accuracy threshold
        run: python check_threshold.py

      # 8. Mock Docker build (only reached if step 7 passes)
      - name: Mock Docker Build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: ${RUN_ID}"
          docker build \
            --build-arg RUN_ID="${RUN_ID}" \
            --tag "fashion-mnist-classifier:${RUN_ID:0:8}" \
            --file Dockerfile \
            . && echo "Docker build SUCCESS" || echo "Docker daemon unavailable – mock build complete"
